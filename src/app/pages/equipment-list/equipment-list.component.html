<div class="w-full">

    <h5 class="text-[18px] font-semibold text-[var(--title)] mb-4">
    Equipment List
  </h5> 

  <!-- input filters plant ,kln no and date picker -->
  <div class="rounded-xl border border-[var(--form-border)] px-4 py-3 mb-2" *ngIf="payload">
    <app-filters
      type="rangepicker"
      [filtersData]="payload"
      [showRange]="false"
      (filterData)="onChangeFilter($event)">
    </app-filters>
  </div>


  <div class="rounded-lg">

    <!-- loader -->
    <div *ngIf="flags.showLoader" class="flex justify-center items-center py-10">
      <app-loader></app-loader>
    </div>

   
    <div *ngIf="!flags.showLoader">

    
      <div class="flex items-center justify-end mb-2" *ngIf="equipmentDataSource.length !== 0">

        <div class="text-[var(--text-color)] flex items-center gap-4 justify-center rounded-md">
          <mat-paginator
            [length]="100"
            [pageSize]="10"
            #paginator
            [pageSizeOptions]="[5,10,25,100]"
            aria-label="Select page">
          </mat-paginator>
        </div>

      </div>

      
      <div
        class="overflow-x-auto  rounded-lg border border-[var(--form-border)] max-h-[470px] "
        *ngIf="equipmentDataSource.length !== 0"
      >

        <table
          mat-table
          matSort
          (matSortChange)="sortData($event)"
          [dataSource]="dataSource"
          class="min-w-full overflow-y-auto"
        >

          <ng-container
            [matColumnDef]="item"
            *ngFor="let item of keysList; let i=index"
          >

            <th
              mat-header-cell
              *matHeaderCellDef
              [mat-sort-header]="item"
              class="px-4 py-3 text-left font-semibold text-black"
            >
              {{displayedColumn[i]}}
            </th>

            <td
              mat-cell
              *matCellDef="let element"
              class="px-4 py-2 border-b text-sm text-[var(--text-color)]"
            >
              {{element[item] ? element[item] : 'N/A'}}
            </td>

          </ng-container>

          <!-- Header -->
          <tr
            mat-header-row
             *matHeaderRowDef="keysList; sticky: true"
            class="!bg-orange-400 text-black "
          ></tr>


          <tr
            mat-row
            *matRowDef="let row; columns: keysList"
            class="hover:bg-[var(--table-hover)] transition"
          ></tr>

        </table>

      </div>

      
      <div
        class="flex justify-center items-center py-10 text-gray-500"
        *ngIf="equipmentDataSource.length === 0"
      >
        No Data Found
      </div>

    </div>

  </div>

</div>
