     <div class="w-full">

  
  <h5 class="text-[18px] font-semibold text-[var(--title)] mb-4">
    Alerts List
  </h5>

  <!-- Inputs filters -->
  <div class="rounded-xl border border-[var(--form-border)] px-4 py-3" *ngIf="payload">
    <app-filters
      type="rangepicker"
      [filtersData]="payload"
      [showRange]="false"
      (filterData)="onChangeFilter($event)">
    </app-filters>
  </div>

 
  <div class="rounded-lg">

    <!--Looader -->
    <div *ngIf="flags.showLoader" class="flex justify-center items-center py-10">
      <app-loader></app-loader>
    </div>

   
    <div *ngIf="!flags.showLoader">

   
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">

        <!-- dropdwn -->
        <div class="w-full md:w-[250px] mt-3">
          <select
            class="w-full min-h-[29px] px-3 text-[13px] rounded-lg
            bg-[var(--input-enable-bg)]
            border border-[var(--input-enable-border)]
            text-[var(--select-input-value)]
            outline-none
            focus:border-[#888888]
            transition-all duration-200
            cursor-pointer"
            [(ngModel)]="selectedOption"
            (change)="getAlertParamterDropDown($event)"
          >

            <option value="All">ALL</option>

            <option
              *ngFor="let data of alertparameterDropDownData"
              [value]="data.Tag_Id">
              {{data.UI_Display_Name ? data.UI_Display_Name : data.Generic_Description}}
            </option>

          </select>
        </div>

        <div
          class="flex mt-3 items-center gap-4 justify-end"
          *ngIf="alertDataSource.length !== 0"
        >

         
          <div class="text-[var(--text-color)] flex items-center gap-4 justify-center rounded-md">
            <mat-paginator
              [length]="100"
              [pageSize]="10"
              #paginator
              [pageSizeOptions]="[5, 10, 25, 100]"
              aria-label="Select page">
            </mat-paginator>
          </div>

        
          <button
            (click)="downloadAlertData()"
            class="flex items-center justify-center
            text-[var(--text-color)] mt-2
            hover:text-[var(--accent-color)]
            transition-colors duration-200">

            <span class="material-symbols-outlined text-[22px]">
              download
            </span>

          </button>

        </div>

      </div>


      <div
        class="overflow-x-auto rounded-lg border border-[var(--form-border)]"
        *ngIf="alertDataSource.length !== 0"
      >

        <table
          mat-table
          matSort
          (matSortChange)="sortData($event)"
          [dataSource]="dataSource"
          class="min-w-full"
        >


          <ng-container
            [matColumnDef]="item"
            *ngFor="let item of keysList; let i=index"
          >

            <th
              mat-header-cell
              *matHeaderCellDef
              [mat-sort-header]="item"
              class="px-4 py-3 text-left font-semibold text-black"
            >
              {{displayedColumn[i]}}
            </th>

            <td
              mat-cell
              *matCellDef="let element"
              class="px-4 py-2 border-b text-sm text-[var(--text-color)]"
            >
              {{element[item] ? element[item] : 'N/A'}}
            </td>

          </ng-container>


          <tr
            mat-header-row
            *matHeaderRowDef="keysList"
            class="!bg-orange-400 text-black"
          ></tr>

         
          <tr
            mat-row
            *matRowDef="let row; columns: keysList"
            class="hover:bg-[var(--table-hover)] transition"
          ></tr>

        </table>

      </div>

      <!-- No Data -->
      <div
        class="flex justify-center items-center py-10 text-gray-500"
        *ngIf="alertDataSource.length === 0"
      >
        No Data Found
      </div>

    </div>

  </div>

</div>
