
<div class="container-fluid">
    
    <div class="card card_apply" >
        <div class="card-body pt-1">
            <div id="style-yRrfL" class="style-yRrfL">
                <div class="row">
                    <div class="col-sm-12">
                        <app-filters type="rangepicker" [filtersData]='payload' [showRange]="false"  *ngIf="payload" (filterData)="onChangeFilter($event)"></app-filters>
                    </div>
                </div>
                <div class="mat-elevation-z8 style-qG6n4" id="style-qG6n4">
                    <div [hidden]="!flags.showLoader">
                        <app-loader></app-loader>
                    </div>
                    <div class="example-container">
                        <div class="row">
                            <div class="col-sm-3">

                                <div class="d-flex">

                                    <!-- <label class="mb-2 dropdownTitle">Parameter</label> -->

                                    <select class="form-select" [(ngModel)]="selectedOption" (change)="getAlertParamterDropDown($event)">

                                        <!-- <option [value]='null' [disabled]="selectedOption === null">--Select Parameter Here--</option> -->
                                        <option value='All'>ALL</option>
                                        <option *ngFor="let data of alertparameterDropDownData" [value]="data.Tag_Id">{{data.UI_Display_Name?data.UI_Display_Name:data.Generic_Description}}</option>

                                       

                                    </select>

                                </div>

                            </div>

                            <div class="col-sm-9 d-flex justify-content-end" [hidden]="alertDataSource.length==0">

                                <mat-paginator [length]="100" [pageSize]="10" #paginator [hidden]="alertDataSource.length==0"

                                    [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page">

                                </mat-paginator>

                                <a (click)="downloadAlertData()" [hidden]="alertDataSource.length==0">

                                    <span class="material download material-symbols-outlined">

                                        download

                                    </span>

                                </a>

                            </div>
                        </div>

                        <table mat-table  matSort (matSortChange)="sortData($event)" [dataSource]="dataSource" [hidden]="alertDataSource.length==0">
                            <ng-container [matColumnDef]="item" *ngFor="let item of keysList;let i=index">
                                <th mat-header-cell [mat-sort-header]="item" *matHeaderCellDef>{{displayedColumn[i]}}</th>
                                <!-- <td mat-cell *matCellDef="let element"> 
                                    <ng-container>
                                        {{element[item]?element[item].toFixed(2):'N/A'}}
                                    </ng-container>
                                </td> -->
                                <td mat-cell *matCellDef="let element"> {{element[item]?element[item]:'N/A'}} </td>
                            </ng-container>
                            <tr mat-header-row *matHeaderRowDef="keysList"></tr>
                            <tr mat-row *matRowDef="let row; columns: keysList;"></tr>
                        </table>
                    </div>
                    <div class="noDataBox" [hidden]="alertDataSource.length!==0">
                        <span class="text-center">No Data Found</span>
                    </div>
                </div>
            </div>
        </div>
    
    </div>
    
</div>
