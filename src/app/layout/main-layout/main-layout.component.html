<!-- main-layout.component.html -->
<div class="flex flex-col h-screen overflow-hidden bg-[var(--bg-color)]">

  <!-- HEADER -->
  <app-header></app-header>

  <!-- BODY -->
  <div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR — no mt-3 wrapper, flush with header -->
    <app-sidebr
      [open]="drawerOpen"
      (openChange)="drawerOpen = $event"
      [collapsed]="collapsed"
      (collapsedChange)="collapsed = $event"
      class="mt-3 border"
    ></app-sidebr>

    <!-- CONTENT AREA — matches React's dynamic collapsed logic -->
    <div
      class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
      [ngClass]="collapsed ? 'lg:ml-20' : 'lg:ml-64'"
    >

      <!-- TOP BAR -->
      <div class="flex items-center justify-between pr-6 pl-3 pt-3 shrink-0">
        <div class="text-sm font-semibold text-[var(--text-color)]">Plants</div>
        <!-- <app-search-bar></app-search-bar> -->
      </div>

      <!-- MAIN AREA -->
      <main
        class="flex flex-col overflow-hidden px-2 sm:px-3 md:px-4 lg:pr-6 lg:pl-2 pb-2 sm:pb-3"
        style="height: calc(100vh - 105px);"
      >

        <!-- SCROLLABLE CONTAINER — matches React's collapsed max-width logic -->
        <div
          class="
            flex-1
            mt-2 sm:mt-3 md:mt-4
            px-3 sm:px-4 md:px-5 lg:px-4 lg:pt-2 lg:pb-4
            pt-2 sm:pt-3
            pb-3 sm:pb-4 md:pb-5
            rounded-xl sm:rounded-2xl
            bg-[var(--bg-leftdrawer)]
            shadow-[var(--left-drawer-shadow)]
            transition-all duration-300
            overflow-y-auto scroll-smooth custom-scrollbar
            w-full mx-auto
          "
          [ngClass]="collapsed ? 'lg:max-w-none' : 'lg:max-w-[1400px] xl:max-w-[1700px]'"
        >

          <!-- Breadcrumb -->
          <div class="mb-2 sm:mb-3">
            <!-- <app-breadcrumb></app-breadcrumb> -->
          </div>

          <!-- Routed Page Content -->
          <router-outlet></router-outlet>

        </div>

      </main>
    </div>
  </div>

  <!-- FOOTER -->
  <app-footer></app-footer>

</div>
